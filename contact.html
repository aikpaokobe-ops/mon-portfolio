   <button id="theme-toggle" class="btn-theme">Passer en Mode Sombre🌙</button>
    <section>
        <h2>Contactez-moi</h2>
        <p class="objet">Un projet, une question ou une opportunité de collaboration ? Laissez-moi un message.</p>

       <form class="contact-form" action="https://formspree.io/f/xkoajdar" method="POST">

    <div class="form-group">
        <label for="name">Votre Nom :</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label for="email">Votre Email :</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label for="message">Votre Message :</label>
        <textarea id="message" name="message" rows="5" placeholder="Écrivez votre message ici..." required></textarea>
        <span id="error-message" class="error-text"></span>
    </div>

    <button type="submit" class="btn-submit">Envoyer le message</button>
</form>
        </section>
